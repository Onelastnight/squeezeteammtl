<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ONE LAST NIGHT</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    font-family:'Montserrat',sans-serif;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN SITE */

.main-site{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated background glow */

.background-glow{
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0) 70%);
    animation:pulse 6s infinite ease-in-out;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:0.4;
    }

    50%{
        transform:scale(1.2);
        opacity:0.7;
    }

    100%{
        transform:scale(1);
        opacity:0.4;
    }
}

/* Floating particles */

.particle{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.15;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-100vh);
    }
}

/* Main container */

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:430px;
    text-align:center;
    animation:fadeIn 2s ease;
}

/* Main title */

h1{
    font-size:65px;
    font-weight:900;
    letter-spacing:10px;
    margin-bottom:15px;

    text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 20px rgba(255,255,255,0.4),
    0 0 40px rgba(255,255,255,0.2);

    animation:titleGlow 4s infinite ease-in-out;
}

@keyframes titleGlow{

    0%{
        text-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 20px rgba(255,255,255,0.2);
    }

    50%{
        text-shadow:
        0 0 25px rgba(255,255,255,1),
        0 0 45px rgba(255,255,255,0.6);
    }

    100%{
        text-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 20px rgba(255,255,255,0.2);
    }

}

.subtitle{
    font-size:12px;
    letter-spacing:6px;
    opacity:0.6;
    margin-bottom:45px;
}

.info{
    font-size:15px;
    line-height:2;
    letter-spacing:4px;
    margin-bottom:35px;
}

.message{
    font-size:13px;
    opacity:0.65;
    line-height:1.7;
    margin-bottom:25px;
}

/* Inputs */

input{
    width:100%;
    padding:16px;
    margin-bottom:15px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    text-align:center;
    font-size:14px;
    letter-spacing:2px;
    transition:0.3s ease;
}

input:focus{
    outline:none;
    border-color:rgba(255,255,255,0.3);
    box-shadow:0 0 20px rgba(255,255,255,0.08);
}

/* Buttons */

button{
    width:100%;
    padding:16px;
    border:none;
    background:white;
    color:black;
    font-weight:700;
    letter-spacing:4px;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

/* Enter experience button */

.music-btn{
    margin-top:18px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    font-size:11px;
    letter-spacing:3px;
}

.music-btn:hover{
    background:rgba(255,255,255,0.05);
}

/* Footer */

.note{
    margin-top:30px;
    font-size:11px;
    opacity:0.35;
    letter-spacing:3px;
}

/* Video screen */

.video-screen{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.video-screen video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Back button */

.back-btn{
    position:absolute;
    bottom:20px;
    left:20px;

    z-index:1000;

    background:rgba(0,0,0,0.5);
    color:white;

    border:1px solid rgba(255,255,255,0.2);

    padding:12px 18px;

    font-size:11px;
    letter-spacing:3px;

    cursor:pointer;

    backdrop-filter:blur(10px);

    width:auto;
}

.back-btn:hover{
    background:white;
    color:black;
}

/* Fade animation */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- FULLSCREEN VIDEO -->

<div class="video-screen" id="videoScreen">

    <video id="mainVideo" autoplay loop muted>

        <source src="video.mp4" type="video/mp4">

    </video>

    <button class="back-btn" onclick="closeVideo()">
        GO BACK
    </button>

</div>

<!-- MAIN WEBSITE -->

<div class="main-site" id="mainSite">

    <!-- Background glow -->

    <div class="background-glow"></div>

    <!-- Floating particles -->

    <div class="particle" style="left:10%; animation-duration:12s;"></div>
    <div class="particle" style="left:25%; animation-duration:18s;"></div>
    <div class="particle" style="left:40%; animation-duration:15s;"></div>
    <div class="particle" style="left:60%; animation-duration:20s;"></div>
    <div class="particle" style="left:75%; animation-duration:14s;"></div>
    <div class="particle" style="left:90%; animation-duration:17s;"></div>

    <div class="container">

        <h1>ONE LAST NIGHT</h1>

        <div class="subtitle">
            SQUEEZE TEAM MTL
        </div>

        <div class="info">
            MAY 30<br>
            8:00 PM<br>
            MONTREAL
        </div>

        <div class="message">
            Enter your email or phone number to receive the location when it drops.
        </div>

        <form action="https://formspree.io/f/mjglzknd" method="POST">

            <input 
                type="email" 
                name="email" 
                placeholder="EMAIL"
            >

            <input 
                type="tel" 
                name="phone" 
                placeholder="PHONE NUMBER"
            >

            <button type="submit">
                GET ACCESS
            </button>

        </form>

        <button class="music-btn" onclick="openVideo()">
            ENTER EXPERIENCE
        </button>

        <div class="note">
            LOCATION REVEALED SOON
        </div>

    </div>

</div>

<!-- BACKGROUND MUSIC -->

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

function openVideo(){

    // Hide website
    document.getElementById("mainSite").style.display = "none";

    // Show video screen
    document.getElementById("videoScreen").style.display = "flex";

    // Play video
    document.getElementById("mainVideo").play();

    // Play music
    document.getElementById("bgMusic").play();

}

function closeVideo(){

    // Hide video
    document.getElementById("videoScreen").style.display = "none";

    // Show website again
    document.getElementById("mainSite").style.display = "flex";

    // Pause video only
    document.getElementById("mainVideo").pause();

}

</script>

</body>
</html>
